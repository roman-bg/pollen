<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>АгроМет — Пчеларски Мониторинг | Цъфтеж в реално време</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #eaf7e6;
            --bg-gradient-end: #cde7cd;
            --card-bg: #ffffffdd;
            --card-bg-solid: #ffffff;
            --primary-green: #2b7a3e;
            --primary-green-dark: #1e5a2f;
            --accent-gold: #e6b422;
            --text-dark: #1e3a2f;
            --text-soft: #2c5e3a;
            --alert-coral: #e0673c;
            --alert-bg: #fff2e6;
            --success-leaf: #47a76a;
            --bloom-badge: #f5b042;
            --shadow-sm: 0 12px 28px rgba(0, 20, 0, 0.08);
            --shadow-hover: 0 20px 32px rgba(0, 32, 0, 0.12);
            --border-radius-card: 32px;
            --transition-default: all 0.25s ease;
        }

        body {
            font-family: 'Inter', system-ui, 'Segoe UI', 'SF Pro Text', 'Poppins', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 24px 20px 48px;
            color: var(--text-dark);
        }

        body::before {
            content: "🌻🐝🌸";
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 68px;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
            white-space: pre;
            transform: rotate(-3deg);
        }

        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(8px);
            padding: 28px 20px;
            border-radius: 48px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(70, 130, 70, 0.2);
            transition: var(--transition-default);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-green), #4c8b3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        h1::before { content: "🐝"; font-size: 2rem; color: var(--primary-green); }
        h1::after { content: "🌼"; font-size: 2rem; color: var(--accent-gold); }

        .controls {
            max-width: 620px;
            margin: 16px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .search-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #citySearch {
            flex: 2;
            min-width: 200px;
            padding: 14px 22px;
            border: 2px solid #cfe3cf;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            background: white;
            outline: none;
            transition: all 0.2s;
        }

        #citySearch:focus {
            border-color: var(--primary-green);
            box-shadow: 0 4px 14px rgba(43, 122, 62, 0.2);
        }

        .search-btn {
            background: var(--primary-green);
            border: none;
            padding: 0 32px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            background: var(--primary-green-dark);
            transform: translateY(-2px);
        }

        .station-selector-wrapper {
            background: rgba(255,255,240,0.7);
            border-radius: 60px;
            padding: 4px 12px 4px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        #stationPicker {
            flex: 2;
            min-width: 220px;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #bfdcae;
            background: white;
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 28px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-bg-solid);
            border-radius: var(--border-radius-card);
            padding: 24px 22px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-default);
            border: 1px solid rgba(80, 120, 70, 0.25);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-green);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-green), var(--accent-gold));
            opacity: 0.7;
        }

        .station-name {
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary-green-dark);
            border-left: 4px solid var(--accent-gold);
            padding-left: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .plant-row {
            margin-bottom: 24px;
            background: #fefef7;
            padding: 12px 14px;
            border-radius: 24px;
        }

        .plant-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .plant-name { font-weight: 700; color: #2c5a2e; display: flex; align-items: center; gap: 6px; }

        .status-badge {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 100px;
            background: #ecf3e8;
            border: 1px solid #cde0cd;
        }

        .status-badge.blooming { background: var(--success-leaf); color: white; border: none; }

        .progress-bar-bg {
            background: #e9f0e5;
            border-radius: 40px;
            height: 18px;
            overflow: hidden;
            margin: 8px 0 6px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #5fad56, #3e8e41);
            border-radius: 40px;
            width: 0%;
            transition: width 1s ease-out;
        }

        .critical-fill { background: linear-gradient(90deg, #e6b422, #e0873a); animation: subtle-pulse 1.2s infinite; }

        @keyframes subtle-pulse { 0%, 100% { opacity: 0.95; } 50% { opacity: 1; } }

        .alert-text {
            color: var(--alert-coral);
            font-weight: 700;
            font-size: 0.75rem;
            background: var(--alert-bg);
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .last-update {
            font-size: 0.7rem;
            color: #8ca882;
            margin-top: 18px;
            text-align: right;
            border-top: 1px dashed #d4e2cc;
            padding-top: 12px;
        }

        .welcome-msg {
            grid-column: 1 / -1;
            text-align: center;
            background: rgba(255, 255, 245, 0.85);
            padding: 48px 24px;
            border-radius: 68px;
            color: var(--primary-green-dark);
            border: 1px solid #cfebc0;
        }

        .info-badge-near {
            grid-column: 1/-1;
            background: #eef5e9;
            border-radius: 48px;
            padding: 14px 24px;
            text-align: center;
            color: #2e673b;
            border-left: 6px solid var(--primary-green);
            margin-bottom: 12px;
        }

        footer { text-align: center; margin-top: 56px; font-size: 0.75rem; color: #5b8253; opacity: 0.7; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <header>
        <h1>АгроМет Пчелар</h1>
        <div class="controls">
            <div class="search-group">
                <input type="text" id="citySearch" placeholder="🔍 Търси село или град... (напр. Козаревец)" onkeypress="if(event.key === 'Enter') searchByCity()">
                <button class="search-btn" onclick="searchByCity()">🌿 Намери станция</button>
            </div>
            <div class="station-selector-wrapper">
                <span>🐝 Избор на станция</span>
                <select id="stationPicker" onchange="selectStation()">
                    <option value="all">📡 Всички станции</option>
                </select>
            </div>
        </div>
    </header>

    <div class="container" id="data-container">
        <div class="welcome-msg">🌱 Зареждаме метеорологични данни и прогнози за цъфтеж...</div>
    </div>
    <footer>🐝 Прогнозата се базира на СЕТ | Данни от https://treebombs.xyz</footer>
</div>

<script>
    let allData = [];
    const API_URL = 'https://treebombs.xyz/data.php';

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            if (result.status === 'success') {
                allData = result.data.sort((a, b) => a.station.localeCompare(b.station));
                populatePicker(allData);
                document.getElementById('data-container').innerHTML = `
                    <div class="welcome-msg">
                        🍯🌻 Добре дошли в пчеларския мониторинг!<br>
                        📍 Въведете населено място или изберете станция за детайлна прогноза.
                    </div>`;
            }
        } catch (e) {
            document.getElementById('data-container').innerHTML = '<div class="welcome-msg" style="color:#b34e3a;">⚠️ Грешка при връзка с отдалечения сървър.</div>';
        }
    }

    function populatePicker(data) {
        const picker = document.getElementById('stationPicker');
        picker.innerHTML = '<option value="all">🌍 Всички станции</option>';
        data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.station;
            opt.textContent = item.station;
            picker.appendChild(opt);
        });
    }

    async function searchByCity() {
        const city = document.getElementById('citySearch').value.trim();
        if (!city) return;
        try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}, Bulgaria&limit=1`);
            const geoData = await resp.json();
            if (geoData.length > 0) {
                findNearestStation(parseFloat(geoData[0].lat), parseFloat(geoData[0].lon), city);
            }
        } catch (err) { alert("Грешка при търсене."); }
    }

    function findNearestStation(userLat, userLon, cityName) {
        let nearest = null; let minDistance = Infinity;
        allData.forEach(st => {
            const R = 6371;
            const dLat = (st.lat - userLat) * Math.PI / 180;
            const dLon = (st.lon - userLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLat*Math.PI/180) * Math.cos(st.lat*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            if (distance < minDistance) { minDistance = distance; nearest = st; }
        });
        if (nearest) renderCards([nearest], `Най-близка станция до ${cityName} е ${nearest.station} (${minDistance.toFixed(1)} км)`);
    }

    function selectStation() {
        const val = document.getElementById('stationPicker').value;
        if (val === 'all') renderCards(allData, "📋 Всички станции");
        else renderCards(allData.filter(i => i.station === val), `📍 Станция: ${val}`);
    }

    function renderCards(data, infoText = "") {
        const container = document.getElementById('data-container');
        container.innerHTML = infoText ? `<div class="info-badge-near">🌼 ${infoText}</div>` : '';
        data.forEach(item => {
            let plants = '';
            (item.forecasts || []).forEach(f => {
                const isBlooming = f.status === "Цъфти";
                const isCritical = f.progress_percent >= 90 && !isBlooming;
                plants += `
                    <div class="plant-row">
                        <div class="plant-info">
                            <div class="plant-name">🌸 ${f.plant}</div>
                            <span class="status-badge ${isBlooming ? 'blooming' : ''}">${f.progress_percent}%</span>
                        </div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill ${isCritical ? 'critical-fill' : ''}" style="width: ${f.progress_percent}%"></div></div>
                        <div class="alert-text">${isBlooming ? '✨ Активен цъфтеж' : (isCritical ? '⚠️ ПОДГОТВЕТЕ КОШЕРИТЕ!' : '🌡️ Очакване')}</div>
                    </div>`;
            });
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="station-name">${item.station}</div>${plants}<div class="last-update">🕒 ${item.last_update || ''}</div>`;
            container.appendChild(card);
        });
    }

    fetchData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Агро Мет</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#2b7a3e">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root{
    --green:#2b7a3e;
    --green-dark:#1e5a2f;
}

body{
    font-family: system-ui, sans-serif;
    background:#dfeadf;
}

.app-shell{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:#f7faf7;
    border-radius:40px;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,var(--green),#4c8b3a);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

/* HEADER */
header{
    padding:20px;
    background:white;
}

h1{
    text-align:center;
    color:var(--green);
}

/* SEARCH */
.search-group{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#citySearch{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#eef5ee;
}

.search-btn{
    padding:0 16px;
    border:none;
    border-radius:12px;
    background:var(--green);
    color:white;
}

/* SELECT */
#stationPicker{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#eef5ee;
}

/* INSTALL BUTTON */
#installBtn{
    margin-top:10px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:16px;
    background:var(--green-dark);
    color:white;
    display:none;
}

/* CONTENT */
.container{
    padding:16px;
}

.card{
    background:white;
    border-radius:20px;
    padding:16px;
    margin-bottom:12px;
}

.station-name{
    font-weight:bold;
    color:var(--green-dark);
}
</style>
</head>

<body>

<div id="splash">Зареждане...</div>

<div class="app-shell">

<header>
    <h1>Агро Мет</h1>

    <div class="search-group">
        <input id="citySearch" placeholder="Търси град..."
        onkeypress="if(event.key==='Enter')searchByCity()">
        <button class="search-btn" onclick="searchByCity()">Търси</button>
    </div>

    <select id="stationPicker" onchange="selectStation()">
        <option value="all">Всички станции</option>
    </select>

    <button id="installBtn">Инсталирай приложението</button>
</header>

<div class="container" id="data-container">
    <div class="info">Зареждане...</div>
</div>

</div>

<script>
let deferredPrompt;
let allData=[];

// 👉 скриване ако вече е инсталирано
if (window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById("installBtn").style.display = "none";
}

// 👉 показване на install бутона
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("installBtn").style.display = "block";
});

// 👉 клик на бутона
document.getElementById("installBtn").addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
});

// 👉 скриване след инсталация
window.addEventListener('appinstalled', () => {
    document.getElementById("installBtn").style.display = "none";
});

// 👉 SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

// 👉 API
const API_URL='https://treebombs.xyz/data.php';

async function fetchData(){
    try{
        const res=await fetch(API_URL);
        const result=await res.json();

        if(result.status==="success"){
            allData=result.data;
            populatePicker(allData);

            document.getElementById("data-container").innerHTML =
                '<div class="info">Избери станция или търси град</div>';
        }

    }catch(e){
        document.getElementById("data-container").innerHTML="Грешка";
    }

    setTimeout(()=>{
        document.getElementById("splash").remove();
    },500);
}

// 👉 dropdown
function populatePicker(data){
    const picker=document.getElementById("stationPicker");
    picker.innerHTML='<option value="all">Всички станции</option>';

    data.forEach(item=>{
        const opt=document.createElement("option");
        opt.value=item.station;
        opt.textContent=item.station;
        picker.appendChild(opt);
    });
}

// 👉 избор
function selectStation(){
    const val=document.getElementById("stationPicker").value;

    if(val==="all"){
        document.getElementById("data-container").innerHTML =
            '<div class="info">Избери конкретна станция</div>';
        return;
    }

    renderCards(allData.filter(i=>i.station===val));
}

// 👉 търсене
async function searchByCity(){
    const city=document.getElementById("citySearch").value.trim();
    if(!city) return;

    const geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}, Bulgaria&limit=1`);
    const data=await geo.json();

    if(data.length){
        findNearest(parseFloat(data[0].lat),parseFloat(data[0].lon));
    }
}

function findNearest(lat,lon){
    let nearest=null;
    let min=Infinity;

    allData.forEach(st=>{
        const d=Math.hypot(st.lat-lat,st.lon-lon);
        if(d<min){min=d; nearest=st;}
    });

    if(nearest) renderCards([nearest]);
}

// 👉 render
function renderCards(data){
    const container=document.getElementById("data-container");
    container.innerHTML="";

    data.forEach(item=>{
        let plants="";

        (item.forecasts||[]).forEach(f=>{
            plants+=`
            <div>
                ${f.plant} (${f.progress_percent}%)
            </div>`;
        });

        container.innerHTML+=`
        <div class="card">
            <div class="station-name">${item.station}</div>
            ${plants}
        </div>`;
    });
}

fetchData();
</script>

</body>
</html>

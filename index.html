<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Агро Мет</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#2b7a3e">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root{
    --green:#2b7a3e;
    --green-dark:#1e5a2f;
}

body{
    font-family: system-ui, sans-serif;
    background:#dfeadf;
}

.app-shell{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:#f7faf7;
    border-radius:40px;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,var(--green),#4c8b3a);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

/* HEADER */
header{
    padding:20px;
    background:white;
}

h1{
    text-align:center;
    color:var(--green);
}

/* SEARCH */
.search-group{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#citySearch{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#eef5ee;
}

.search-btn{
    padding:0 16px;
    border:none;
    border-radius:12px;
    background:var(--green);
    color:white;
}

/* SELECT */
#stationPicker{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#eef5ee;
}

/* INSTALL BUTTON */
#installBtn{
    margin-top:10px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:16px;
    background:var(--green-dark);
    color:white;
    display:none;
}

/* CONTENT */
.container{
    padding:16px;
}

.card{
    background:white;
    border-radius:20px;
    padding:16px;
    margin-bottom:12px;
}

.station-name{
    font-weight:bold;
    color:var(--green-dark);
}

/* центриране на информационния блок + допълнителен стил */
.info-message-wrapper {
    text-align: center;
    margin: 16px 0 8px 0;
}

.info-text {
    background: #eef5ee;
    display: inline-block;
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 0.9rem;
    color: #1e5a2f;
    font-weight: 500;
}

.hint-text {
    text-align: center;
    font-size: 0.75rem;
    color: #4a6a3b;
    margin-top: 4px;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
}
</style>
</head>

<body>

<div id="splash">Зареждане...</div>

<div class="app-shell">

<header>
    <h1>Агро Мет</h1>

    <div class="search-group">
        <input id="citySearch" placeholder="Търси град..."
        onkeypress="if(event.key==='Enter')searchByCity()">
        <button class="search-btn" onclick="searchByCity()">Търси</button>
    </div>

    <select id="stationPicker" onchange="selectStation()">
        <option value="all">Всички станции</option>
    </select>

    <button id="installBtn">Инсталирай приложението</button>
</header>

<div class="container" id="data-container">
    <!-- Тук динамично ще се показва информационният блок + картите -->
</div>

</div>

<script>
let deferredPrompt;
let allData=[];

// 👉 скриване ако вече е инсталирано
if (window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById("installBtn").style.display = "none";
}

// 👉 показване на install бутона
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("installBtn").style.display = "block";
});

// 👉 клик на бутона
document.getElementById("installBtn").addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
});

// 👉 скриване след инсталация
window.addEventListener('appinstalled', () => {
    document.getElementById("installBtn").style.display = "none";
});

// 👉 SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

// 👉 API
const API_URL='https://treebombs.xyz/data.php';

async function fetchData(){
    try{
        const res=await fetch(API_URL);
        const result=await res.json();

        if(result.status==="success"){
            allData=result.data;
            populatePicker(allData);

            // показваме центриран информационен текст + подсказка за СЕТ
            renderEmptyStateWithHint();
        }

    }catch(e){
        document.getElementById("data-container").innerHTML="<div class='info-message-wrapper'><div class='info-text'>⚠️ Грешка при зареждане</div></div>";
    }

    setTimeout(()=>{
        document.getElementById("splash").remove();
    },500);
}

// функция за празно състояние с центриран текст и допълнителен надпис
function renderEmptyStateWithHint() {
    const container = document.getElementById("data-container");
    container.innerHTML = `
        <div class="info-message-wrapper">
            <div class="info-text">Избери станция или търси град</div>
        </div>
        <div class="hint-text">
            СЕТ = процент оставащ до цъфтежа
        </div>
    `;
}

// 👉 dropdown
function populatePicker(data){
    const picker=document.getElementById("stationPicker");
    picker.innerHTML='<option value="all">Всички станции</option>';

    data.forEach(item=>{
        const opt=document.createElement("option");
        opt.value=item.station;
        opt.textContent=item.station;
        picker.appendChild(opt);
    });
}

// 👉 избор на станция от падащото меню
function selectStation(){
    const val=document.getElementById("stationPicker").value;

    if(val==="all"){
        // показваме отново центрираното съобщение с подсказката
        renderEmptyStateWithHint();
        return;
    }

    renderCards(allData.filter(i=>i.station===val));
}

// 👉 търсене по град (геокодиране + най-близка станция)
async function searchByCity(){
    const city=document.getElementById("citySearch").value.trim();
    if(!city) return;

    // добавяме лек индикатор за зареждане
    const container = document.getElementById("data-container");
    container.innerHTML = `<div class="info-message-wrapper"><div class="info-text">🔍 Търсене на "${city}" ...</div></div>`;

    try {
        const geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}, Bulgaria&limit=1`);
        const data=await geo.json();

        if(data.length){
            findNearest(parseFloat(data[0].lat),parseFloat(data[0].lon));
        } else {
            container.innerHTML = `
                <div class="info-message-wrapper">
                    <div class="info-text">❌ Градът не е намерен в България</div>
                </div>
                <div class="hint-text">🌱 СЕТ = процент оставащ до цъфтежа</div>
            `;
        }
    } catch(e) {
        container.innerHTML = `
            <div class="info-message-wrapper">
                <div class="info-text">⚠️ Грешка при геокодиране</div>
            </div>
            <div class="hint-text">🌱 СЕТ = процент оставащ до цъфтежа</div>
        `;
    }
}

function findNearest(lat,lon){
    let nearest=null;
    let min=Infinity;

    allData.forEach(st=>{
        const d=Math.hypot(st.lat-lat,st.lon-lon);
        if(d<min){min=d; nearest=st;}
    });

    if(nearest) {
        renderCards([nearest]);
    } else {
        const container = document.getElementById("data-container");
        container.innerHTML = `
            <div class="info-message-wrapper">
                <div class="info-text">🔍 Няма налични станции в района</div>
            </div>
            <div class="hint-text">🌱 СЕТ = процент оставащ до цъфтежа</div>
        `;
    }
}

// 👉 основно рендериране на карти с прогнози
function renderCards(data){
    const container=document.getElementById("data-container");
    container.innerHTML="";

    if(!data || data.length === 0){
        // ако няма данни (не би трябвало да се случва), но за всеки случай:
        renderEmptyStateWithHint();
        return;
    }

    data.forEach(item=>{
        let plants="";
        // добавяме прогнозите за различните растения
        if(item.forecasts && item.forecasts.length){
            item.forecasts.forEach(f=>{
                plants+=`
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #e0e7e0;">
                    <span style="font-weight:500;">${f.plant}</span>
                    <span style="background:#eef5ee; padding:4px 12px; border-radius:20px; font-weight:600; color:#1e5a2f;">${f.progress_percent}%</span>
                </div>`;
            });
        } else {
            plants = `<div style="padding: 10px 0; color:#666;">Няма прогнози за тази станция</div>`;
        }

        container.innerHTML+=`
        <div class="card">
            <div class="station-name" style="margin-bottom:12px;">📍 ${item.station}</div>
            ${plants}
        </div>`;
    });

    // винаги добавяме подсказката за СЕТ след картите (за да е видима, че процентът е оставащ до цъфтеж)
    const hintDiv = document.createElement("div");
    hintDiv.className = "hint-text";
    hintDiv.style.marginTop = "12px";
    hintDiv.style.marginBottom = "8px";
    hintDiv.style.textAlign = "center";
    hintDiv.innerText = "🌱 СЕТ = процент оставащ до цъфтежа";
    container.appendChild(hintDiv);
}

// стартиране: зареждаме данни
fetchData();
</script>

</body>
</html>
